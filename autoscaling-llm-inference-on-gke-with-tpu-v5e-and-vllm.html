 has three independent gates: regional TPU quota, a global accelerator cap called `GPUS_ALL_REGIONS`, and physical capacity. I had regional quota (16 chips) but `GPUS_ALL_REGIONS` was set to 0 – and despite the name, it blocks TPUs too, counted per chip. After testing six zones across three regions and hitting capacity exhaustion everywhere, the quota gate finally revealed itself once capacity opened up.\u003c/p\u003e\u003cp\u003eI requested 16 chips. Google's quota team offered 1. Anything beyond that requires Sales engagement. With a single chip (16GB HBM), I deployed Gemma 3 4B instead of the originally planned Gemma 4 26B.\u003c/p\u003e\u003cfigure class=\"kg-card kg-image-card kg-card-hascaption\"\u003e\u003cimg loading=\"lazy\" src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2026/04/Screenshot-2026-04-29-at-11.01.55---AM.png\" class=\"kg-image\" alt=\"\" loading=\"lazy\" width=\"2940\" height=\"1668\"\u003e\u003cfigcaption\u003e\u003cspan style=\"white-space: pre-wrap;\"\u003eGKE Console showing the TPU cluster with both node pools healthy\u003c/span\u003e\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003e## Gemma 4 Compatibility\u003c/p\u003e\u003cp\u003eI tested every Gemma 4 variant available on vLLM's TPU backend (both `latest` and `nightly` images). All four attempts failed. The stable image didn't recognize the `gemma4` architecture. The nightly image got further but hit `AssertionError: Expect no shared layers` – Gemma 4 uses weight-tied layers that the `tpu-inference` backend doesn't support yet. This affects all Gemma 4 variants (E2B, E4B, 26B-A4B, 31B).\u003c/p\u003e\u003cp\u003e## The Working Deployment\u003c/p\u003e\u003cp\u003eThe final stack runs Gemma 3 4B on a single TPU v5e chip via `vllm/vllm-tpu:nightly`, with the full autoscaling infrastructure proven and operational. The HPA reads `num_requests_waiting` from Managed Prometheus and can scale the deployment from 1 to N replicas, which in turn triggers the GKE node pool autoscaler to provision additional TPU nodes.\u003c/p\u003e\u003cfigure class=\"kg-card kg-image-card kg-card-hascaption\"\u003e\u003cimg loading=\"lazy\" src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2026/04/Screenshot-2026-04-29-at-11.03.45---AM.png\" class=\"kg-image\" alt=\"\" loading=\"lazy\" width=\"2500\" height=\"202\"\u003e\u003cfigcaption\u003e\u003cspan style=\"white-space: pre-wrap;\"\u003eHPA output showing the metric pipeline working: 0/5 targets, 1 replica\u003c/span\u003e\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eThe architecture scales to 8 chips and larger models by changing five configuration values: machine type, topology label, TPU count, tensor parallel size, and model name. Everything else – GCS FUSE caching, Workload Identity, PodMonitoring, HPA, load testing scripts – stays identical.\u003c/p\u003e\u003cp\u003e## Conclusion\u003c/p\u003e\u003cp\u003e- `GPUS_ALL_REGIONS` is the hidden gate. Check it before anything else.\u003c/p\u003e\u003cp\u003e- TPU capacity errors auto-retry; quota errors are permanent. Know which you're hitting.\u003c/p\u003e\u003cp\u003e- GKE requires both `gke-tpu-accelerator` and `gke-tpu-topology` node selectors. Missing either triggers a Warden rejection.\u003c/p\u003e\u003cp\u003e- Build the full stack on minimal hardware first. Prove it works, then scale up.\u003c/p\u003e\u003cp\u003eThe full article, all Kubernetes manifests, and helper scripts are available in the [GitHub repository](https://github.com/xprilion/gemma3-vllm-tpu-gke-autoscaling). The detailed writeup is published at [xprilion.github.io/gemma3-vllm-tpu-gke-autoscaling](https://xprilion.github.io/gemma3-vllm-tpu-gke-autoscaling/).\u003c/p\u003e\u003chr\u003e\u003cp\u003e*This project was part of #TPUSprint by Google's AI Developer Programs team. Google Cloud credits were provided for this project.*\u003c/p\u003e"])</script><script>self.__next_f.push([1,"6:[\"$\",\"$L14\",null,{\"children\":[[\"$\",\"div\",null,{\"cl
