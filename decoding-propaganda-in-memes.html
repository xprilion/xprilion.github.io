",\"h\",{\"children\":[null,[[\"$\",\"$L11\",null,{\"children\":\"$L12\"}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]],[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$14\",null,{\"fallback\":null,\"children\":\"$L15\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"12:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\ne:null\n"])</script><script>self.__next_f.push([1,"16:I[176,[\"588\",\"static/chunks/588-0bb63aadff1d8868.js\",\"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"default\"]\n17:I[4256,[\"588\",\"static/chunks/588-0bb63aadff1d8868.js\",\"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"\"]\n18:I[1781,[\"588\",\"static/chunks/588-0bb63aadff1d8868.js\",\"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"default\"]\n19:T1fef,"])</script><script>self.__next_f.push([1,"\u003cp\u003eMemes - the nice images you see floating around literally everywhere on the Internet these days and the stuff that fuels your social media. Memes began as a source of entertainment - containing jokes and visual additions to the joke which would often add more spice to it. However, memes have evolved in the recent times to deliver a wider range of content - news, opinions, dissent, praises and unfortunately - propaganda and fake information.\u003c/p\u003e\n\u003cp\u003eWhat goes on in your mind when you view a meme which is funny, but is under the hood demeaning to a community or a group of people who believe in something? Have you seen memes which you felt were trying hard to push the ideology of a certain section of people in the society or memes which felt downright an attack on someone?\u003c/p\u003e\n\u003cp\u003eAre you able to recognize such memes instantly? Or has it been that you shared a meme which you found funny but someone pointed out its falsehood to you, only after you had already spread it to a good number of people? It is important here to realize that opinion and falsehood are different things. It is crucial to be able to differentiate when you are spreading ideas and when you are being a tool for spreading misinformation by sharing a meme which has a falsehood based bias in it.\u003c/p\u003e\n\u003cp\u003eLet\u0026#39;s try to understand the width of the impact that biased memes can have on your day to day life. Consider the following Google Trends chart about how much \u0026quot;political meme\u0026quot; has been searched in the last decade (October 2010 - October 2020) -\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/04/image-15.png\" alt=\"\"\u003e\nNotice the days when there has been a major spike. You shall observe the spikes happened in the years - 2020, 2016, 2012. What\u0026#39;s common in these years? The US Presidential elections.\u003c/p\u003e\n\u003cp\u003eThis article, is going to help you with a few pointers which you can keep in mind to realize the bias in memes that you view, in a hope that the next time you share a meme, you\u0026#39;ll have a fair idea about what impact it can have.\u003c/p\u003e\n\u003cp\u003eCase #1 - The Positive Propaganda\u003c/p\u003e\n\u003cp\u003eLet\u0026#39;s begin on a lighter tone. Propaganda need not always be negative. It could be directed towards creating a genuine positive sentiment for someone/something. Take a look at this one -\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/04/image-16.png\" alt=\"\"\u003e\nThis one is fairly easy to understand - a happy man. Happiness radiates the presence of no worries and thus, a content person. Now, you might ask yourself who do you see as content - someone who has made good decisions in life? Or is it someone who has a lot of money and does not have to worry about the trivials of life? In short, someone who is successful.\u003c/p\u003e\n\u003cp\u003eThus, if you were to see this meme anywhere, you would take the presented political leader as someone who is successful and does not worry about his opponents.\u003c/p\u003e\n\u003cp\u003eIn contrast, if I were to present you with the following meme -\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/04/image-17.png\" alt=\"\"\u003e\nHere you find that the same political leader is asking for financial support for his campaigns. While this is a serious and obvious message, it is seen as a moment of weakness. Thus, it was imperative for the opponents to seize opportunity of this moment and turn it into a popular meme, such that every time someone saw this image of the political leader, they would develop a feeling that the leader was weak and would not likely be successful in his campaign.\u003c/p\u003e\n\u003cp\u003eCase #2 - Destroying image of organization/person\u003c/p\u003e\n\u003cp\u003eOften, memes target a single person or organization. This may be done for several reasons, but often it has happened that this leads to media trials and unfair pressure against an entity which may not have done anything wrong.\u003c/p\u003e\n\u003cp\u003eConsider the following meme -\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/04/image-18.png\" alt=\"\"\u003e\nWhile it may tickle the bone of some for the implications that the teacher in the meme is actually a terrorist trying to educate the student in terrorist activities, there is an addition of the logo of Khan Academy at 3 places in this meme. This has been done to implicate that Khan Academy is a terrorist organization and the education imparted there is to train terrorists.\u003c/p\u003e\n\u003cp\u003eTo an uninformed individual, this meme holds the potential to set a negative image of Khan Academy in his/her mind. Further, the meme tries to implicate that any organization starting with the word \u0026quot;Khan\u0026quot; may be a terrorist organization and furthers this point by adding a Muslim skull cap to the student in the meme.\u003c/p\u003e\n\u003cp\u003eFor those of you who do not know - Khan Academy is one of the most revolutionary ideas that came up in this century and has benefited students all across the globe by offering free education. Several other educational startups sprang up trying to replicate their model with a difference that they would charge money. Khan Academy remains free and unparalleled to the date.\u003c/p\u003e\n\u003cp\u003eIt is uncomely that such attempt at maligning a beautiful initiative has been made.\u003c/p\u003e\n\u003cp\u003eCase #3 - The Hate spreading\u003c/p\u003e\n\u003cp\u003eNow let\u0026#39;s look at some more serious type of biases memes can present. Spreading hate is one of the most common acts that memes try to pull of these days. Look at the following memes -\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/04/image-20.png\" alt=\"\"\u003e\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/04/image-21.png\" alt=\"\"\u003e\nIn both the above instances, hatred is being spread either in the meme itself or by the caption. The first image is an instance of spreading hatred towards an entire community and further, in the caption it uses a popular provoking slogan which was used by certain political leaders to incite venom towards a larger community in a different situation.\u003c/p\u003e\n\u003cp\u003eThe other one is a morphed image of a political leader aiming to indignify the individual and thus, weaken the person\u0026#39;s worth in the society.\u003c/p\u003e\n\u003cp\u003eSuch memes which openly target a certain person or society either within the meme itself or by the accompanying caption tend to be repeatedly promoted by people of the group which benefits by sharing them. Such groups of people who want those memes to become viral will likely post it several times in the same or similar forums and try to use more and more provocative language along with them to incite hot reactions from the opposing groups, thus increasing the reach of their posts.\u003c/p\u003e\n\u003ch2\u003eThe Checklist of Propaganda Memes\u003c/h2\u003e\n\u003cp\u003eNow let me get down to a checklist which can help you identify quickly memes which are trying hard to send down your brain propaganda of their benefit -\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/04/image-22.png\" alt=\"\"\u003e\nIf the meme you are viewing ticks any of the above points, you might want to double check it for propaganda. It may not always be the same, but in most cases you will find evidence of it promoting or discrediting a certain idea, person or community.\u003c/p\u003e\n\u003cp\u003ePages or social media influencers who regularly post such content might be trying to politically or socially influence you into hating or promoting a single idea, political or social figure or community. It might be a wise idea to give such pages an unfollow to make sure that you base your opinions on factual information instead of the idea that is fed to you subconsciously through online propaganda campaigns which in the current date often include memes, popular meme pages, influencers, videos which may seem humorous, etc.\u003c/p\u003e\n\u003cp\u003eRemember that your memes have to be entertaining - if it is not funny, it is not a meme, its plain propaganda. Don\u0026#39;t let anyone buy their way into your mental health and influence you to hate someone.\u003c/p\u003e\n\u003cp\u003eBe safe online!\u003c/p\u003e\n\u003cp\u003eIf you have instances of memes which are biased or drive a propaganda, feel free to put them in the comments below with what you think it is trying to do. It would an added case study and definitely help the next reader! :)\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L16\",null,{\"children\":[[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"$L17\",null,{\"href\":\"/posts\",\"className\":\"text-blue-600 hover:underline mb-4 block\",\"children\":\"← Back to all posts\"}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-2\",\"children\":\"Decoding Propaganda In Memes\"}],[\"$\",\"p\",null,{\"className\":\"text-gray-600 dark:text-gray-200 text-sm \",\"children\":\"20 April, 2025\"}]]}],\"\",[\"$\",\"$L18\",null,{\"html\":\"$19\",\"slug\":\"decoding-propaganda-in-memes\",\"title\":\"Decoding Propaganda In Memes\"}],\"$L1a\",\"$L1b\"]}]\n"])</script><script>self.__next_f.push([1,"1c:I[7037,[\"588\",\"static/chunks/588-0bb63aadff1d8868.js\",\"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"\"]\n1a:[\"$\",\"$L1c\",null,{\"id\":\"MathJax-script\",\"src\":\"https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js\",\"async\":true,\"strategy\":\"afterInteractive\"}]\n1b:[\"$\",\"$L1c\",null,{\"id\":\"MathJax-config\",\"strategy\":\"beforeInteractive\",\"dangerouslySetInnerHTML\":{\"__html\":\"\\n          MathJax = {\\n            tex: {\\n              inlineMath: [['((', '))']],\\n              displayMath: [['[[', ']]']],\\n            },\\n            svg: {\\n              fontCache: 'global'\\n            }\\n          };\\n        \"}}]\n"])</script><script>self.__next_f.push([1,"1d:I[9993,[],\"IconMark\"]\n10:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Decoding Propaganda In Memes\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Memes - the nice images you see floating around literally everywhere on the Internet these days and the stuff that fuels your social media. Memes began as a source of entertainment - containing jokes \"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/logo.jpg\"}],[\"$\",\"$L1d\",\"3\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n15:\"$10:metadata\"\n"])</script></body></html>
