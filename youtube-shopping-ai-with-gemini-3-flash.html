"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"\"]\n18:I[1833,[\"588\",\"static/chunks/588-0bb63aadff1d8868.js\",\"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"Image\"]\n19:I[1781,[\"588\",\"static/chunks/588-0bb63aadff1d8868.js\",\"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"default\"]\n1a:T25d0,"])</script><script>self.__next_f.push([1,"\u003cp\u003eIf you like shopping research but hate \u003cem\u003etab debt\u003c/em\u003e, this project is for you: \u003cstrong\u003esearch YouTube, pick a handful of videos, then ask questions and generate a course-like buying guide\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eYou can try the deployed version here:\u003ca href=\"https://yt-shopping-ai.xprilion.com\"\u003e yt-shopping-ai.xprilion.com.\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eThis post is intentionally \u003cem\u003enot\u003c/em\u003e a step-by-step beginner tutorial. It’s a build note about the decisions: \u003cstrong\u003ewhy these choices\u003c/strong\u003e, what they buy you, what they cost you, and when you’d pick the alternatives in real projects.\u003c/p\u003e\n\u003ch2\u003eThe Problem\u003c/h2\u003e\n\u003cp\u003eShopping content on YouTube is great… and also chaotic:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe best advice is often buried at minute 14:37 after three sponsor segues.\u003c/li\u003e\n\u003cli\u003eDifferent creators disagree (sometimes loudly) and the truth is in the overlap.\u003c/li\u003e\n\u003cli\u003eYou don’t want “a summary”. You want \u003cstrong\u003ea decision\u003c/strong\u003e: what to buy, why, and the tradeoffs.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSo the product goal becomes:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003eTurn a messy pile of video opinions into a compact, source-backed guide that helps a human choose.\u003c/em\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2\u003e\u003cstrong\u003eWhat you’re building\u003c/strong\u003e\u003c/h2\u003e\n\u003cp\u003eA Next.js App that:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esearches for YouTube videos via Google’s search stack\u003c/li\u003e\n\u003cli\u003elets you select videos\u003c/li\u003e\n\u003cli\u003egenerates a structured “course outline”\u003c/li\u003e\n\u003cli\u003eextracts transcript-like summaries with timestamps\u003c/li\u003e\n\u003cli\u003eanswers questions with sources back to timestamps\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAnd yes, it’s “bring your own keys” (BYOK), but that’s more of an operational choice than the main character.\u003c/p\u003e\n\u003ch2\u003eRun it locally (minimal)\u003c/h2\u003e\n\u003cp\u003eIf you already live in the Next.js ecosystem, you know the drill. Clone the repo, install deps, start dev.\u003c/p\u003e\n\u003cp\u003eIf you \u003cem\u003edon’t\u003c/em\u003e (or you’re rusty), here are the canonical references:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eNode install: \u003ca href=\"https://nodejs.org\"\u003ehttps://nodejs.org\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003epnpm: \u003ca href=\"https://pnpm.io/installation\"\u003ehttps://pnpm.io/installation\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNow, let\u0026#39;s explore some of the decision making that went into building this project.\u003c/p\u003e\n\u003ch2\u003e\u003cstrong\u003eDecision 1: Search is a product feature, not a backend detail\u003c/strong\u003e\u003c/h2\u003e\n\u003cp\u003eThe first fork: \u003cstrong\u003ehow do you find videos?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eYou have options:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eYouTube Data API (structured, quota rules, extra auth story)\u003c/li\u003e\n\u003cli\u003eScraping (fast to start, high-maintenance, questionable vibes)\u003c/li\u003e\n\u003cli\u003e“Search powered by Google” (good relevance, simple mental model)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThis project uses \u003cstrong\u003eGoogle Programmable Search Engine\u003c/strong\u003e (PSE) API because:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRelevance is the whole game\u003c/strong\u003e: for shopping queries, Google’s ranking usually beats anything you can DIY in a weekend.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eControl is “good enough”\u003c/strong\u003e: you can restrict results to \u003ccode\u003eyoutube.com\u003c/code\u003e and further tweak the engine by user demographics - location, age, language, etc., if you wish to utilize those.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe UI stays simple\u003c/strong\u003e: a text box, results, pick what you want.\nIf you’re new to PSE, start here: G\u003ca href=\"https://programmablesearchengine.google.com/about/\"\u003eoogle Programmable Search Engine overview\u003c/a\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003ePros\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eGreat general relevance and “it just works” UX. You can constrain to a site (YouTube) without building search infra.\u003c/p\u003e\n\u003ch3\u003eCons\u003c/h3\u003e\n\u003cp\u003eResult metadata isn’t as rich as a dedicated YouTube API model. You cannot grab comments, channel details, etc using the search API alone. But hey, that\u0026#39;s a problem for another day.\u003c/p\u003e\n\u003ch3\u003eHow to pick\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eChoose \u003cstrong\u003eYouTube Data API\u003c/strong\u003e if you need: channels, playlists, publish dates, analytics-ish metadata, or a “video-first” product where precision beats convenience.\u003c/li\u003e\n\u003cli\u003eChoose \u003cstrong\u003ePSE\u003c/strong\u003e if you want: fast iteration, broad query coverage, and you can live with “I guide others to treasures I cannot possess” (I guide others to results I cannot produce/store).\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2\u003eDecision 2: “Transcript” doesn’t have to mean “verbatim”\u003c/h2\u003e\n\u003cp\u003eThe next fork: \u003cstrong\u003ehow do you get the content of the video into a model?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eYou could chase perfect transcripts. Or you can treat transcripts as a means to an end: \u003cstrong\u003eretrieval and citation\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eYT Shopping AI uses Gemini to generate a \u003cstrong\u003etimestamped transcript summary\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eThat’s a deliberate trade:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe UI needs “good-enough grounding” to answer questions.\u003c/li\u003e\n\u003cli\u003eThe user needs \u003cstrong\u003esource points\u003c/strong\u003e (timestamps) more than raw text walls.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003ePros\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eIt’s fast to read and useful for Q\u0026amp;A.\u003c/li\u003e\n\u003cli\u003eTimestamped sections make citations feel real (“go to 08:12”) instead of vibes.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eCons\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eIt’s not verbatim; nuance can get compressed.\u003c/li\u003e\n\u003cli\u003eModels can hallucinate if the input is weak or the prompt is too confident.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eHow to pick\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eIf you’re building \u003cstrong\u003ecompliance\u003c/strong\u003e tooling (legal, medical, finance): you want verbatim transcripts and strict provenance.\u003c/li\u003e\n\u003cli\u003eIf you’re building \u003cstrong\u003econsumer decision support\u003c/strong\u003e: summaries with timestamps are often the sweet spot.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2\u003e\u003cstrong\u003eDecision 3: Multi-video is the antidote to creator bias\u003c/strong\u003e\u003c/h2\u003e\n\u003cp\u003eSingle-video assistants feel smart until you realize they’ve just become a fan account for whoever you watched last.\u003c/p\u003e\n\u003cp\u003eWe force a more honest workflow:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esearch broadly\u003c/li\u003e\n\u003cli\u003epick multiple videos\u003c/li\u003e\n\u003cli\u003eanswer questions across them\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe structure matters because shopping decisions are inherently comparative:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e“Battery life” isn’t a number; it’s a trade vs weight, thermals, price.\u003c/li\u003e\n\u003cli\u003e“Best” changes when you add constraints: budget, region, availability, returns.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003ePros\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eYou get triangulation: overlap across creators is usually the truth.\u003c/li\u003e\n\u003cli\u003eYou can surface disagreements explicitly (“Video A says X, Video B says Y”).\u003c/li\u003e\n\u003cli\u003eYou get over the bias that could have been introduced by sponsored videos.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eCons\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eMore compute, more latency.\u003c/li\u003e\n\u003cli\u003eMore chances for contradiction, which means you need better prompting and UX.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eHow to pick\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eIf you’re building a “video companion” product (one creator, one long tutorial), single-source is simpler and often better.\u003c/li\u003e\n\u003cli\u003eIf you’re building “what should I buy?”, multi-source is almost mandatory.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2\u003eDecision 4: Separate “course outline” from “Q\u0026amp;A”\u003c/h2\u003e\n\u003cp\u003eDon’t ask the model to do everything in one shot.\u003c/p\u003e\n\u003cp\u003eThe app splits:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOutline generation: produce a stable structure (“Before you buy”, “Alternatives”, “Reviews”…)\u003c/li\u003e\n\u003cli\u003eQ\u0026amp;A: answer targeted questions with sources\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eWhy?\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eOutlines anchor the session. They reduce the “blank page” problem.\u003c/li\u003e\n\u003cli\u003eQ\u0026amp;A becomes more surgical. Users ask better questions when they see a map.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003ePros\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eBetter UX: users feel guided, not dumped into a chat void.\u003c/li\u003e\n\u003cli\u003eBetter model behavior: each call has a tight, obvious job.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eCons\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eMore endpoints, more moving pieces.\u003c/li\u003e\n\u003cli\u003eYou have to reconcile when the outline suggests topics not covered in the selected videos.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2\u003eArchitecture\u003c/h2\u003e\n\u003cp\u003eHere’s the big picture:\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/12/diagram.png\" alt=\"\"\u003e\u003c/p\u003e\n\u003ch3\u003eUI layer\u003c/h3\u003e\n\u003cp\u003eThe UI drives the workflow:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSearch\u003c/strong\u003e: query → results\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSelect\u003c/strong\u003e: choose videos worth trusting\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExtract\u003c/strong\u003e: generate transcript-like summaries with timestamps\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAsk\u003c/strong\u003e: ask questions across selected videos, get sources back\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGenerate\u003c/strong\u003e: create a structured “course-like” outline for the shopping topic\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eAPI routes\u003c/h3\u003e\n\u003cp\u003eThe server is intentionally “dumb”: it turns requests into upstream calls.\u003c/p\u003e\n\u003cp\u003eEndpoints:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/api/search-videos\u003c/code\u003e: calls Google’s Custom Search JSON API endpoint (powered by your PSE CX)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/api/get-transcript\u003c/code\u003e: uses Gemini to extract a detailed, timestamped transcript summary from a video URL\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/api/ask-videos\u003c/code\u003e: uses Gemini to answer questions and returns source timestamps\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/api/generate-course\u003c/code\u003e: uses Gemini to generate the shopping “course outline” JSON\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2\u003eA note on keys\u003c/h2\u003e\n\u003cp\u003eKeys are stored in the browser and sent per request. It’s not “the point”, but it does make the deployment story clean:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePros\u003c/strong\u003e: no billing headache for me, no secret storage, fewer infra obligations, easier open-source demo.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCons\u003c/strong\u003e: users manage keys; you can’t do server-side caching/shared quotas as easily. Sometimes, they may not have access to the required models.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIf you were productizing this, you’d likely add first-party auth + server-side key management for UX and reliability, and greater speeds. Probably slap on your own pricing model and make it a business!\u003c/p\u003e\n\u003ch2\u003eConclusion\u003c/h2\u003e\n\u003cp\u003eNext upgrades I’d do if this were a real product:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eA “confidence” UI: show when sources disagree, not just the answer.\u003c/li\u003e\n\u003cli\u003eA “budget + constraints” panel so the model stops guessing your life.\u003c/li\u003e\n\u003cli\u003eMake it a business?\u003c/li\u003e\n\u003c/ul\u003e\n"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L16\",null,{\"children\":[[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"$L17\",null,{\"href\":\"/posts\",\"className\":\"text-blue-600 hover:underline mb-4 block\",\"children\":\"← Back to all posts\"}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-2\",\"children\":\"Building YouTube Shopping AI with Gemini 3 Flash\"}],[\"$\",\"p\",null,{\"className\":\"text-gray-600 dark:text-gray-200 text-sm \",\"children\":\"20 December, 2025\"}]]}],[\"$\",\"$L18\",null,{\"src\":\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/12/yt-shopping-ai-with-Gemini-3-Flash.png\",\"alt\":\"Building YouTube Shopping AI with Gemini 3 Flash\",\"loading\":\"lazy\",\"className\":\"w-full h-auto mb-6 rounded-lg object-cover object-center shadow-md shadow-gray-400/30 dark:shadow-gray-700/30\",\"width\":1000,\"height\":1000}],[\"$\",\"$L19\",null,{\"html\":\"$1a\",\"slug\":\"youtube-shopping-ai-with-gemini-3-flash\",\"title\":\"Building YouTube Shopping AI with Gemini 3 Flash\"}],\"$L1b\",\"$L1c\"]}]\n"])</script><script>self.__next_f.push([1,"1d:I[7037,[\"588\",\"static/chunks/588-0bb63aadff1d8868.js\",\"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"\"]\n1b:[\"$\",\"$L1d\",null,{\"id\":\"MathJax-script\",\"src\":\"https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js\",\"async\":true,\"strategy\":\"afterInteractive\"}]\n1c:[\"$\",\"$L1d\",null,{\"id\":\"MathJax-config\",\"strategy\":\"beforeInteractive\",\"dangerouslySetInnerHTML\":{\"__html\":\"\\n          MathJax = {\\n            tex: {\\n              inlineMath: [['((', '))']],\\n              displayMath: [['[[', ']]']],\\n            },\\n            svg: {\\n              fontCache: 'global'\\n            }\\n          };\\n        \"}}]\n"])</script><script>self.__next_f.push([1,"1e:I[9993,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"10:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Building YouTube Shopping AI with Gemini 3 Flash\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"YouTube-first shopping guides with Next.js + Gemini + Programmable Search\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"Building YouTube Shopping AI with Gemini 3 Flash | xprilion's blog\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"YouTube-first shopping guides with Next.js + Gemini + Programmable Search\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:image\",\"content\":\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/12/yt-shopping-ai-with-Gemini-3-Flash.png\"}],[\"$\",\"meta\",\"5\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"6\",{\"name\":\"twitter:title\",\"content\":\"Building YouTube Shopping AI with Gemini 3 Flash | xprilion's blog\"}],[\"$\",\"meta\",\"7\",{\"name\":\"twitter:description\",\"content\":\"YouTube-first shopping guides with Next.js + Gemini + Programmable Search\"}],[\"$\",\"meta\",\"8\",{\"name\":\"twitter:image\",\"content\":\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/12/yt-shopping-ai-with-Gemini-3-Flash.png\"}],[\"$\",\"link\",\"9\",{\"rel\":\"icon\",\"href\":\"/logo.jpg\"}],[\"$\",\"$L1e\",\"10\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"15:\"$10:metadata\"\n"])</script></body></html>
