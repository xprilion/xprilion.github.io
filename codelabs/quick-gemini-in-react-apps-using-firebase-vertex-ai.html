over to \u003ca href=\"https://console.cloud.google.com/\"\u003eGoogle Cloud Platform\u003c/a\u003e and create an account.\u003c/li\u003e\n\u003cli\u003eEnable billing\u003c/li\u003e\n\u003cli\u003eCreate a new project, let\u0026#39;s name it \u003ccode\u003eproject-x\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIf you\u0026#39;re doing this at an in-person workshop and have access to trial credits from GCP, follow the instructions on screen to activate the account and redeem your credits.\u003c/p\u003e\n\u003ch2\u003eAccess Firebase Console\u003c/h2\u003e\n\u003cp\u003eDuration: 2\u003c/p\u003e\n\u003cp\u003eHead to \u003ca href=\"https://console.firebase.google.com/\"\u003eFirebase Console \u003c/a\u003eand accept conditions as you like them.\u003c/p\u003e\n\u003ch2\u003eAccess Firebase Studio\u003c/h2\u003e\n\u003cp\u003eDuration: 2\u003c/p\u003e\n\u003cp\u003eHead to \u003ca href=\"https://studio.firebase.google.com\"\u003eFirebase Studio\u003c/a\u003e and accept any T\u0026amp;C as suitable.\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/image-30.png\" alt=\"\"\u003e\u003c/p\u003e\n\u003ch2\u003eCreate a React Project\u003c/h2\u003e\n\u003cp\u003eDuration: 5\u003c/p\u003e\n\u003cp\u003eIn Firebase Studio, click on \u0026quot;+ New Workspace\u0026quot; button to bring up the template selector page/modal. Choose \u0026quot;React\u0026quot;.\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.16.05-AM.png\" alt=\"\"\u003e\nProvide any name for your workspace and select the \u0026quot;Typescript\u0026quot; radio. You can choose to go with Javascript, you dinosaur.\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.17.37-AM.png\" alt=\"\"\u003e\nWait for the workspace creation to complete because good things take time.\u003c/p\u003e\n\u003cp\u003eOnce done, you should see the Firebase Studio code editor interface as shown below.\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.20.24-AM.png\" alt=\"\"\u003e\nNow, we\u0026#39;re good to start integrating Firebase Vertex AI to our application!\u003c/p\u003e\n\u003ch2\u003eCreate a Firebase Project\u003c/h2\u003e\n\u003cp\u003eDuration: 5\u003c/p\u003e\n\u003cp\u003eNow, head to the Firebase Console at \u003ca href=\"https://console.firebase.google.com/\"\u003ehttps://console.firebase.google.com\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eTry clicking this fancy card - \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.25.02-AM.png\" alt=\"\"\u003e\nGive your project any name as suitable.\u003c/p\u003e\n\u003cp\u003eComplete the next steps as you feel like, until you end up with another loading screen followed by -\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.27.13-AM.png\" alt=\"\"\u003e\u003c/p\u003e\n\u003ch2\u003eGet Project Config keys\u003c/h2\u003e\n\u003cp\u003eDuration: 3\u003c/p\u003e\n\u003cp\u003eNow, we need to obtain the Firebase config keys for our project.\u003c/p\u003e\n\u003cp\u003eHead to Project Overview \u0026gt; Project Settings in the top left menu as shown below:\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.27.51-AM.png\" alt=\"\"\u003e\nScroll down and Click the \u003ccode\u003e\u0026lt;/\u0026gt;\u003c/code\u003e icon to setup a web app configuration for this project.\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.28.12-AM.png\" alt=\"\"\u003e\nYou should see a form like the one shown below:\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.28.29-AM.png\" alt=\"\"\u003e\nFill in the name and other details as you feel suitable. You should eventually be able to see the commands to run and the configuration keys.\u003c/p\u003e\n\u003ch2\u003eAdd Firebase to your project code\u003c/h2\u003e\n\u003cp\u003eDuration: 5\u003c/p\u003e\n\u003cp\u003eHead back to the editor interface in the Firebase Studio.\u003c/p\u003e\n\u003cp\u003eOpen a new terminal at the bottom of the screen by clicking the \u003ccode\u003e+\u003c/code\u003e button as shown below - \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.35.15-AM.png\" alt=\"\"\u003e\nCopy the command from the Firebase Console and run it into the new terminal: \u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-curl\"\u003enpm install firebase\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eIf all goes well, you\u0026#39;ll see a clean installation on your terminal, if not, you can see it below:\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.39.30-AM.png\" alt=\"\"\u003e\nNext, create a file \u003ccode\u003econfig.ts\u003c/code\u003e inside your \u003ccode\u003esrc\u003c/code\u003e folder in the studio code editor.\u003c/p\u003e\n\u003cp\u003eCopy and paste the configuration provided in the Firebase Console. \u003c/p\u003e\n\u003cp\u003eAt the end of the \u003ccode\u003econfig.ts\u003c/code\u003e file, add the following line to complete it for usage.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-typescript\"\u003eexport default app;\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eYour whole file should look like this now:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-typescript\"\u003e// Import the functions you need from the SDKs you need\nimport { initializeApp } from \u0026quot;firebase/app\u0026quot;;\n// TODO: Add SDKs for Firebase products that you want to use\n// https://firebase.google.com/docs/web/setup#available-libraries\n\n// Your web app\u0026#39;s Firebase configuration\nconst firebaseConfig = {\n  apiKey: \u0026quot;AIzaSxxxxxxxxxxxxxxxxxx0r-nhRfFg\u0026quot;,\n  authDomain: \u0026quot;my-react-ai.firebaseapp.com\u0026quot;,\n  projectId: \u0026quot;my-react-ai\u0026quot;,\n  storageBucket: \u0026quot;my-react-ai.firebasestorage.app\u0026quot;,\n  messagingSenderId: \u0026quot;1871xxxxxxx999\u0026quot;,\n  appId: \u0026quot;1:1871xxxxxxx999:web:10xxxxxx7df9a\u0026quot;\n};\n\n// Initialize Firebase\nconst app = initializeApp(firebaseConfig);\n\nexport default app;\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eIf you\u0026#39;re successful till here, chances are you\u0026#39;ll be successful in the rest of your life, and this codelab.\u003c/p\u003e\n\u003ch2\u003eActivate Firebase Vertex AI\u003c/h2\u003e\n\u003cp\u003eDuration: 5\u003c/p\u003e\n\u003cp\u003eHead back to the Firebase Console. \u003c/p\u003e\n\u003cp\u003eOn the left menu bar, click on AI \u0026gt; Vertex AI. \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.44.42-AM.png\" alt=\"\"\u003e\nAmong the presented options of using Firebase Vertex AI, we\u0026#39;ll go for \u0026quot;Vertex AI in Firebase\u0026quot; - \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.45.58-AM.png\" alt=\"\"\u003e\nClick on Get Started to face the reality of life - good things don\u0026#39;t come free. \u003c/p\u003e\n\u003cp\u003eYou\u0026#39;ll be asked to create/select a billing account for this Firebase project. \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.46.52-AM.png\" alt=\"\"\u003e\nOnce you\u0026#39;re done, you\u0026#39;ll see the following approval of your affluence - \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.47.16-AM.png\" alt=\"\"\u003e\nNow, the only thing remains is to activate the APIs required for running Vertex AI via Firebase.\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.49.31-AM.png\" alt=\"\"\u003e\nClick on the big blue \u0026quot;Enable APIs\u0026quot; button.\u003c/p\u003e\n\u003ch2\u003eInitalize and Integrate Firebase Vertex AI\u003c/h2\u003e\n\u003cp\u003eDuration: 5\u003c/p\u003e\n\u003cp\u003eNow we\u0026#39;re ready to start integrating Firebase Vertex AI into our React app. \u003c/p\u003e\n\u003cp\u003eHead back to the Firebase Studio code editor and in the terminal, enter the following command:\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-bash\"\u003efirebase init\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThis will trigger a test of your faith in Firebase Studio. Choose to trust it as shown below: \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.54.03-AM.png\" alt=\"\"\u003e\nOnce granted, you\u0026#39;ll be presented with a list of your Google Cloud Projects to choose from to link with this project on Firebase Studio.\u003c/p\u003e\n\u003cp\u003eChoose the one we recently created!\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.54.18-AM.png\" alt=\"\"\u003e\nWhen done, your terminal will update to ask you which Firebase services you want to initialize for this project. \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.56.20-AM.png\" alt=\"\"\u003e\nWe don\u0026#39;t really need any of these because there\u0026#39;s no separate configuration required but just for the sake of completing the command, choose \u0026quot;Storage\u0026quot; and hit enter for the next steps. \u003c/p\u003e\n\u003cp\u003eYou\u0026#39;ll be asked to select the relevant project you want to select for your code - choose the one you just created.\n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-10.57.47-AM.png\" alt=\"\"\u003e\nKeep hitting \u0026quot;Enter\u0026quot; until this process completes.\u003c/p\u003e\n\u003cp\u003eNext, import the Vertex AI into your code in \u003ccode\u003econfig.ts\u003c/code\u003e . Add the following line: \u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-typescript\"\u003e// Import the functions you need from the SDKs you need\nimport { initializeApp } from \u0026quot;firebase/app\u0026quot;;\nimport { getVertexAI, getGenerativeModel } from \u0026quot;firebase/vertexai\u0026quot;; // Add this line\n\n...\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eNow we can initialize Gemini through Vertex AI and export it. Add the following lines in the \u003ccode\u003econfig.ts\u003c/code\u003e after initializing the \u003ccode\u003eapp\u003c/code\u003e but before exporting it: \u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-typescript\"\u003e...\n\nconst app = initializeApp(firebaseConfig);\n\n// Add the lines below\n\n// Initialize FirebaseApp\nconst app = initializeApp(firebaseConfig);\n\n// Initialize the Vertex AI service\nconst vertexAI = getVertexAI(app);\n\n// Initialize the generative model with a model that supports your use case\nconst model = getGenerativeModel(vertexAI, { model: \u0026quot;gemini-2.0-flash\u0026quot; });\n\n// Wrap in an async function so you can use await\nexport async function geminiApi(prompt: string) {\n  // To generate text output, call generateContent with the text input\n  const result = await model.generateContent(prompt);\n\n  const response = result.response;\n  const text = response.text();\n  return text;\n}\n\n// Add the lines above\n\nexport default app;\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eAt this point, your entire file should look like this: \n\u003ca href=\"https://github.com/xprilion/gemini-firebase-vertex-ai-react/blob/main/src/config.ts\"\u003egemini-firebase-vertex-ai-react/src/config.ts at main · xprilion/gemini-firebase-vertex-ai-reactContribute to xprilion/gemini-firebase-vertex-ai-react development by creating an account on GitHub.\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/icon/pinned-octocat-093da3e6fa40.svg\" alt=\"\"\u003eGitHubxprilion\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/thumbnail/gemini-firebase-vertex-ai-react\" alt=\"\"\u003e\u003c/a\u003e\nIf you\u0026#39;re still with me, good news, we\u0026#39;ve arrived at the last step!\u003c/p\u003e\n\u003ch2\u003eUse Gemini in your React App\u003c/h2\u003e\n\u003cp\u003eDuration: 10\u003c/p\u003e\n\u003cp\u003eFinally, we\u0026#39;re ready to use the \u003ccode\u003egeminiApi\u003c/code\u003e function we\u0026#39;ve created. Let\u0026#39;s quickly update the \u003ccode\u003eApp.tsx\u003c/code\u003e file to create a UI for generating something using the Gemini API.\u003c/p\u003e\n\u003cp\u003eUpdate your \u003ccode\u003eApp.tsx\u003c/code\u003e with the following code, compeltely replacing it is fine: \n\u003ca href=\"https://github.com/xprilion/gemini-firebase-vertex-ai-react/blob/main/src/App.tsx\"\u003egemini-firebase-vertex-ai-react/src/App.tsx at main · xprilion/gemini-firebase-vertex-ai-reactContribute to xprilion/gemini-firebase-vertex-ai-react development by creating an account on GitHub.\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/icon/pinned-octocat-093da3e6fa40.svg\" alt=\"\"\u003eGitHubxprilion\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/thumbnail/gemini-firebase-vertex-ai-react\" alt=\"\"\u003e\u003c/a\u003e\nThis creates a simple interface for a \u0026quot;Gemini prompt enhancer\u0026quot; which essentially makes your simple prompts more nuanced and then allows you to use them!\u003c/p\u003e\n\u003cp\u003eIn the Web tab on your Firebase Studio editor you should be able to see this: \n\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2025/05/Screenshot-2025-05-04-at-11.10.59-AM.png\" alt=\"\"\u003e\u003c/p\u003e\n\u003ch2\u003eConclusion\u003c/h2\u003e\n\u003cp\u003eDuration: 2\u003c/p\u003e\n\u003cp\u003eCongratulations on making it here! 🎉\u003c/p\u003e\n\u003cp\u003eHow easy was that!? Its just a few clicks and commands with a lot of defaults to integrate Gemini APIs into your existing Firebase apps - without having to add any extra keys or having to manage them! Best part - Vertex AI is production ready!\u003c/p\u003e\n\u003cp\u003eYou can explore the entire codebase here: \n\u003ca href=\"https://github.com/xprilion/gemini-firebase-vertex-ai-react\"\u003eGitHub - xprilion/gemini-firebase-vertex-ai-reactContribute to xprilion/gemini-firebase-vertex-ai-react development by creating an account on GitHub.\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/icon/pinned-octocat-093da3e6fa40.svg\" alt=\"\"\u003eGitHubxprilion\u003cimg src=\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/thumbnail/gemini-firebase-vertex-ai-react\" alt=\"\"\u003e\u003c/a\u003e\nIf you found this codelab fun and useful, share it with someone who can benefit from this!\u003c/p\u003e\n\u003ch2\u003eWhat\u0026#39;s Next?\u003c/h2\u003e\n\u003cp\u003eDuration: 1\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eExperiment with adding image generation via Firebase Vertex AI. Hint: Google for \u0026quot;firebase vertex ai imagen image generation\u0026quot;.\u003c/li\u003e\n\u003cli\u003eAdd proper rate limits onto your app before giving it out to the world.\u003c/li\u003e\n\u003cli\u003eTry adding Firebase Vertex AI on your Firebase Admin SDK apps.\u003c/li\u003e\n\u003c/ul\u003e\n"])</script><script>self.__next_f.push([1,"9:[\"$\",\"div\",null,{\"className\":\"flex flex-col min-h-screen px-2 md:px-4 bg-background text-foreground\",\"children\":[[\"$\",\"$L13\",null,{\"title\":\"Quick Gemini in React apps using Firebase Vertex AI\",\"closeBtn\":t
