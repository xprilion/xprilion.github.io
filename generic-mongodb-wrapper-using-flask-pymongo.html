9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"default\"]\n19:T2fe2,"])</script><script>self.__next_f.push([1,"\u003chr\u003e\n\u003cp\u003eHey there, hope you\u0026#39;re well! It\u0026#39;s been a while since I wrote something here, to my defence I wrote this tutorial about \u003ca href=\"https://www.digitalocean.com/community/tutorials/how-to-set-up-a-jupyterlab-environment-on-ubuntu-18-04\"\u003eHow to setup a secure, remote JupyterLab workstation\u003c/a\u003e on \u003ca href=\"https://digitalocean.com\"\u003eDigitalOcean\u003c/a\u003e. Have you not read it yet? Go ahead and explore it if you\u0026#39;re interested in the topic! Now, moving ahead.\u003c/p\u003e\n\u003cp\u003eThis blog is going to be about creating a generic wrapper API for your MongoDB installation using Flask and PyMongo. If you\u0026#39;ve little idea about what these terms mean, here we go -\u003c/p\u003e\n\u003ch2\u003e1. PyMongo and MongoDB\u003c/h2\u003e\n\u003cp\u003eWhen you\u0026#39;re working with the cool \u003ca href=\"https://mongodb.com\"\u003eMongoDB\u003c/a\u003e using Python, \u003ca href=\"https://pymongo.readthedocs.io/en/stable/\"\u003ePyMongo\u003c/a\u003e is your go to tool. The distribution facilitates a full fledged support for interacting with MongoDB databases, local or remote and provides a dead simple way of working with it through your Python code.\u003c/p\u003e\n\u003ch2\u003e2. Flask\u003c/h2\u003e\n\u003cp\u003eA very popular library in Python for creating web sites, often preferred for lightweight tasks and more often for creating API servers quickly, \u003ca href=\"https://flask.palletsprojects.com\"\u003eFlask\u003c/a\u003e provides a way to have a no-frills web server running in minutes.\u003c/p\u003e\n\u003ch2\u003e3. You\u003c/h2\u003e\n\u003cp\u003e\u003cimg src=\"https://media1.tenor.com/images/07feba4572471b21fd4258b6af83c9c4/tenor.gif\" alt=\"\"\u003e\u003c/p\u003e\n\u003cp\u003eA super cool person reading this nice blog for whom I hope I can make the time spent here worth!\u003c/p\u003e\n\u003cp\u003eNow that we\u0026#39;re done with the introductions, let\u0026#39;s chalk out a plan that we shall follow in this tutorial. Imagine a situation where you have a MongoDB database with yourselves, and are wondering how to use it for some basic \u003ca href=\"https://en.wikipedia.org/wiki/Create,_read,_update_and_delete\"\u003eCRUD\u003c/a\u003e operations from a remotely running application. Further, to make things interesting, you\u0026#39;re unsure what collections in the database your application shall need, or it may even need to create arbitrary collections at any moment. Fortunately, you hit upon the golden idea of creating some public APIs to your database server using Flask which allow just those operations with our without some authentication, as per your need.\u003c/p\u003e\n\u003cp\u003eWhile I\u0026#39;m going to leave the (tiny) headache of getting a MongoDB server to you, which you can easily get on many online providers, even for free at some places, I shall begin with the requirements of our API.\u003c/p\u003e\n\u003ch2\u003eThe specification\u003c/h2\u003e\n\u003cp\u003eIf you went through the specification of CRUD, you know that we need 4 REST APIs to begin with -\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eAction\u003c/th\u003e\n\u003cth\u003eMethod\u003c/th\u003e\n\u003cth\u003eMongoDB\u003c/th\u003e\n\u003cth\u003eParameters\u003c/th\u003e\n\u003cth\u003eEndpoint\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003eCreate\u003c/td\u003e\n\u003ctd\u003ePOST, PUT\u003c/td\u003e\n\u003ctd\u003eInsert\u003c/td\u003e\n\u003ctd\u003eNone\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"http://example.com/table\"\u003eexample.com/table\u003c/a\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eRead All/One\u003c/td\u003e\n\u003ctd\u003eGET\u003c/td\u003e\n\u003ctd\u003eFind\u003c/td\u003e\n\u003ctd\u003eNone/Resource ID\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"http://example.com/table/%5Bid%5D\"\u003eexample.com/table/[id]\u003c/a\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eUpdate\u003c/td\u003e\n\u003ctd\u003ePOST, PUT, PATCH\u003c/td\u003e\n\u003ctd\u003eUpdate\u003c/td\u003e\n\u003ctd\u003eResource ID\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"http://example.com/table/id\"\u003eexample.com/table/id\u003c/a\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eDelete\u003c/td\u003e\n\u003ctd\u003eDELETE\u003c/td\u003e\n\u003ctd\u003eDelete\u003c/td\u003e\n\u003ctd\u003eResource ID\u003c/td\u003e\n\u003ctd\u003e\u003ca href=\"http://example.com/table/id\"\u003eexample.com/table/id\u003c/a\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003ch2\u003eThe preparation\u003c/h2\u003e\n\u003cp\u003eNow, we shall make sure we have some helper code ready for usage, usually to handle any errors on the API or simply to respond to an \u0026quot;are you alive\u0026quot; ping from anywhere remote.\u003c/p\u003e\n\u003cp\u003eFirst off, you\u0026#39;d need the right libraries installed. We shall be using the \u003ccode\u003eflask_pymongo\u003c/code\u003e which is a wrapper around PyMongo with helpers for Flask provided. Besides, we will need the \u003ccode\u003eflask_cors\u003c/code\u003e library to \u003ca href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS\"\u003eallow fetching of resources from a different domain\u003c/a\u003e.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-bash\"\u003epip install flask, flask_pymongo, flask_cors\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eLet\u0026#39;s import these libraries (and others which might be needed) into our script.\u003c/p\u003e\n\u003ch3\u003eStep 1: Importing libraries\u003c/h3\u003e\n\u003cp\u003eCreate a file named \u003ca href=\"http://app.py\"\u003e\u003ccode\u003eapp.py\u003c/code\u003e\u003c/a\u003e in your working directory. Add the following lines to import all needed libraries -\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003eimport os\nfrom flask import Flask, request, make_response\nfrom flask_pymongo import PyMongo, ObjectId\nfrom flask_cors import CORS\nimport datetime\nfrom bson.json_util import dumps\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3\u003eStep 2: Setup constants, MongoDB connection and helper objects\u003c/h3\u003e\n\u003cp\u003eNow, let us define the stuff we shall be needing globally in the code.\u003c/p\u003e\n\u003cp\u003eFirst, let\u0026#39;s create an instance of our Flask app -\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003eapp = Flask(__name__)\nCORS(app)\nAPP_ROOT = os.path.dirname(os.path.abspath(__file__))\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThe \u003ccode\u003eCORS(app)\u003c/code\u003e enables CORS for the API we shall run. Next, let\u0026#39;s define some HTTP status code responses we shall be making in the API.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e# HTTP status code constants\nHTTP_SUCCESS_GET_OR_UPDATE          =   200\nHTTP_SUCCESS_CREATED                =   201\nHTTP_SUCCESS_DELETED                =   204\nHTTP_SERVER_ERROR                   =   500\nHTTP_NOT_FOUND                      =   404\nHTTP_BAD_REQUEST                    =   400\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThen, create a connection object for PyMongo -\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003eapp.config[\u0026quot;MONGO_URI\u0026quot;] = \u0026quot;mongodb://username:password@host:port/database?authSource=admin\u0026quot;\nmongo = PyMongo(app)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eFinally, we shall be creating a helper function that prepares the responses our API makes -\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003edef send(data, status_code):\n    return make_response(dumps(data), status_code)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThis function will be responsible for preparing the data before finally giving it out through the API. Sometimes you might want global transforms on all output you\u0026#39;re producing, this is where they go.\u003c/p\u003e\n\u003ch2\u003eThe real deal\u003c/h2\u003e\n\u003cp\u003eNow, we can setup the APIs to wrap around PyMongo. Let us start with the \u003ccode\u003eCreate\u003c/code\u003e API.\u003c/p\u003e\n\u003ch3\u003eStep 4: Create API\u003c/h3\u003e\n\u003cp\u003eIn this step, I shall first put out the code for you to study, and then attempt explaining it.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e@app.route(\u0026#39;/\u0026lt;collection_name\u0026gt;\u0026#39;, methods=[\u0026#39;POST\u0026#39;])\ndef post_item(collection_name):\n    \u0026quot;\u0026quot;\u0026quot;\n        Post one item in collection.\n    \u0026quot;\u0026quot;\u0026quot;\n    collection = getattr(mongo.db, collection_name)\n    formdata = request.json\n    try:\n        insert_id = str(collection.insert_one(formdata).inserted_id)\n        output = {\u0026#39;message\u0026#39;: \u0026#39;new item created\u0026#39;, \u0026quot;_id\u0026quot;: insert_id}\n        return send(output, HTTP_SUCCESS_CREATED)\n    except Exception as e:\n        output = {\u0026#39;error\u0026#39; : str(e)}\n        return send(output, HTTP_BAD_REQUEST)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eIn the code above, you see that we created a \u003ccode\u003e/\u0026lt;collection_name\u0026gt;\u003c/code\u003e route. This means that we have kept the collection name generic, and whatever collection name is being passed to it, the API will attempt to insert data into it, or if it doesn\u0026#39;t exist yet in the database, it will first create the collection and then insert the item.\u003c/p\u003e\n\u003cp\u003eThe API returns an \u003ccode\u003eid\u003c/code\u003e which is useful for entry level operations like reading a single entry, updating it or deleting it.\u003c/p\u003e\n\u003ch3\u003eStep 5: Read API\u003c/h3\u003e\n\u003cp\u003eNext, we shall create an API to read the entries in the collection. There can be two instances of read - one in which you try to read exactly 1 entry and the other where you need all entries. Let us create these.\u003c/p\u003e\n\u003cp\u003eFirst, let\u0026#39;s create an API that returns all items in a collection -\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e@app.route(\u0026#39;/\u0026lt;collection_name\u0026gt;\u0026#39;, methods=[\u0026#39;GET\u0026#39;])\ndef get_all_items(collection_name):\n    \u0026quot;\u0026quot;\u0026quot;\n        Documents in a collection.\n    \u0026quot;\u0026quot;\u0026quot;\n    collection = getattr(mongo.db, collection_name)\n    output = []\n    for q in collection.find():\n        output.append(q)\n    return send(output, HTTP_SUCCESS_GET_OR_UPDATE)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eNow, any \u003ccode\u003eGET\u003c/code\u003e request to any \u003ccode\u003ecollection_name\u003c/code\u003e will attempt to display all items in that collection. If it does not exist, the API will simply return a blank list, but will not attempt to create the collection.\u003c/p\u003e\n\u003cp\u003eThen, let\u0026#39;s create the route to get information about a single entry -\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e@app.route(\u0026#39;/\u0026lt;collection_name\u0026gt;/\u0026lt;id\u0026gt;\u0026#39;, methods=[\u0026#39;GET\u0026#39;])\ndef get_one_item(collection_name, id):\n    \u0026quot;\u0026quot;\u0026quot;\n        Get one item from a collection.\n    \u0026quot;\u0026quot;\u0026quot;\n    collection = getattr(mongo.db, collection_name)\n    r = collection.find_one({\u0026#39;_id\u0026#39;: ObjectId(id)})\n    if r:\n        return send(r, HTTP_SUCCESS_GET_OR_UPDATE)\n    else:\n        return send({\u0026#39;error\u0026#39; : \u0026#39;item not found\u0026#39;}, HTTP_NOT_FOUND)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eNotice that the above route accepts both \u003ccode\u003ecollection_name\u003c/code\u003e and \u003ccode\u003eid\u003c/code\u003e. This \u003ccode\u003eid\u003c/code\u003e is the one which is returned in the Create API.\u003c/p\u003e\n\u003ch3\u003eStep 6: Update API\u003c/h3\u003e\n\u003cp\u003eNow, let\u0026#39;s create an API to allow updating one entry at a time. It would need to have both the \u003ccode\u003ecollection_name\u003c/code\u003e and \u003ccode\u003eid\u003c/code\u003e parameters and would be accessible by a \u003ccode\u003ePUT\u003c/code\u003e request.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e@app.route(\u0026#39;/\u0026lt;collection_name\u0026gt;/\u0026lt;id\u0026gt;\u0026#39;, methods=[\u0026#39;PUT\u0026#39;])\ndef update_item(collection_name, id):\n    \u0026quot;\u0026quot;\u0026quot;\n        Update one item in collection.\n    \u0026quot;\u0026quot;\u0026quot;\n    collection = getattr(mongo.db, collection_name)\n    r = collection.find_one({\u0026#39;_id\u0026#39;: ObjectId(id)})\n    if r:\n        for key in request.json.keys():\n            r[key] = request.json[key]\n        try:\n            collection.replace_one({\u0026quot;_id\u0026quot;: ObjectId(id)}, r)\n            output = {\u0026#39;message\u0026#39; : \u0026#39;item updated\u0026#39;}\n            return send(output, HTTP_SUCCESS_GET_OR_UPDATE)\n        except Exception as e:\n            output = {\u0026#39;error\u0026#39; : str(e)}\n            return send(output, HTTP_BAD_REQUEST)\n    else:\n        output = {\u0026#39;error\u0026#39; : \u0026#39;item not found\u0026#39;}\n        return send(output, HTTP_NOT_FOUND)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eNote that before we update the item, we check for its existence. You could skip this behaviour and could create an API which attempts to Create or Update, which is a popular requirement in many use cases.\u003c/p\u003e\n\u003ch3\u003eStep 7: Delete API\u003c/h3\u003e\n\u003cp\u003eA rather simpler API, the Delete API too needs both the \u003ccode\u003ecollection_name\u003c/code\u003e and \u003ccode\u003eid\u003c/code\u003e and listens to the \u003ccode\u003eDELETE\u003c/code\u003e request.\u003c/p\u003e\n\u003cpre\u003e\u003ccode class=\"language-python\"\u003e@app.route(\u0026#39;/\u0026lt;collection_name\u0026gt;/\u0026lt;id\u0026gt;\u0026#39;, methods=[\u0026#39;DELETE\u0026#39;])\ndef delete_item(collection_name, id):\n    \u0026quot;\u0026quot;\u0026quot;\n        Delete one item from collection.\n    \u0026quot;\u0026quot;\u0026quot;\n    collection = getattr(mongo.db, collection_name)\n    r = collection.find_one({\u0026#39;_id\u0026#39;: ObjectId(id)})\n    if r:\n        try:\n            collection.remove(r[\u0026quot;_id\u0026quot;])\n            return send(\u0026quot;\u0026quot;, HTTP_SUCCESS_DELETED)\n        except Exception as e:\n            output = {\u0026#39;error\u0026#39; : str(e)}\n            return send(output, HTTP_BAD_REQUEST)\n    else:\n        output = {\u0026#39;error\u0026#39; : \u0026#39;item not found\u0026#39;}\n        return send(output, HTTP_NOT_FOUND)\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2\u003eConclusion\u003c/h2\u003e\n\u003cp\u003eWith the above APIs, and any more you might wish to add to it, you can have a simple API wrapper around your MongoDB database which allows you to work with any collection at any moment. To get the full code head over to \u003ca href=\"https://github.com/xprilion/generic-pymongo-flask\"\u003ehttps://github.com/xprilion/generic-pymongo-flask\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eIf you read through the code in the \u003ca href=\"http://app.py\"\u003e\u003ccode\u003eapp.py\u003c/code\u003e\u003c/a\u003e on the repository you\u0026#39;ll find a few more functions there, which can be a useful addition to your API.\u003c/p\u003e\n\u003cp\u003eThanks for making time for going through this tutorial!\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L16\",null,{\"children\":[[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"$L17\",null,{\"href\":\"/posts\",\"className\":\"text-blue-600 hover:underline mb-4 block\",\"children\":\"← Back to all posts\"}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-2\",\"children\":\"A Generic MongoDB Wrapper API with Flask and PyMongo\"}],[\"$\",\"p\",null,{\"className\":\"text-gray-600 dark:text-gray-200 text-sm \",\"children\":\"20 April, 2025\"}]]}],\"\",[\"$\",\"$L18\",null,{\"html\":\"$19\",\"slug\":\"generic-mongodb-wrapper-using-flask-pymongo\",\"title\":\"A Generic MongoDB Wrapper API with Flask and PyMongo\"}],\"$L1a\",\"$L1b\"]}]\n"])</script><script>self.__next_f.push([1,"1c:I[7037,[\"588\",\"static/chunks/588-0bb63aadff1d8868.js\",\"97\",\"static/chunks/97-1d845183694e9fa9.js\",\"833\",\"static/chunks/833-96920393002296c8.js\",\"356\",\"static/chunks/app/(blog)/%5Bslug%5D/page-c418f8b972a4b1b5.js\"],\"\"]\n1a:[\"$\",\"$L1c\",null,{\"id\":\"MathJax-script\",\"src\":\"https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js\",\"async\":true,\"strategy\":\"afterInteractive\"}]\n1b:[\"$\",\"$L1c\",null,{\"id\":\"MathJax-config\",\"strategy\":\"beforeInteractive\",\"dangerouslySetInnerHTML\":{\"__html\":\"\\n          MathJax = {\\n            tex: {\\n              inlineMath: [['((', '))']],\\n              displayMath: [['[[', ']]']],\\n            },\\n            svg: {\\n              fontCache: 'global'\\n            }\\n          };\\n        \"}}]\n"])</script><script>self.__next_f.push([1,"1d:I[9993,[],\"IconMark\"]\n10:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"A Generic MongoDB Wrapper API with Flask and PyMongo\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"---\\n\\nHey there, hope you're well! It's been a while since I wrote something here, to my defence I wrote this tutorial about [How to setup a secure, remote JupyterLab workstation](https://www.digitaloc\"}],[\"$\",\"link\",\"2\",{\"rel\":\"icon\",\"href\":\"/logo.jpg\"}],[\"$\",\"$L1d\",\"3\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n15:\"$10:metadata\"\n"])</script></body></html>
