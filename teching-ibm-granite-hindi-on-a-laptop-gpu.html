 two CUDA OOMs, one broken checkpoint resume, a GGUF export that refused to build, and a lot of \u003ccode\u003envidia-smi\u003c/code\u003e staring.\u003c/blockquote\u003e\u003ch2 id=\"the-setup\"\u003eThe Setup\u003c/h2\u003e\u003cp\u003eHere's what I was working with:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eGPU\u003c/strong\u003e: NVIDIA RTX 3070 Laptop (8 GB VRAM)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eBase model\u003c/strong\u003e: \u003ccode\u003eibm-granite/granite-4.1-3b\u003c/code\u003e (3.5B params, Apache 2.0). \u003ca href=\"https://huggingface.co/ibm-granite/granite-4.1-3b\" rel=\"noreferrer\"\u003eLink\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eDataset\u003c/strong\u003e: \u003ccode\u003eFreedomIntelligence/evol-instruct-hindi\u003c/code\u003e — ~59K Hindi instruction samples in ShareGPT format. \u003ca href=\"https://huggingface.co/datasets/FreedomIntelligence/evol-instruct-hindi\" rel=\"noreferrer\"\u003eLink\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eMethod\u003c/strong\u003e: QLoRA (4-bit NF4 quantization + LoRA adapters)\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eFramework\u003c/strong\u003e: Unsloth + SFTTrainer (TRL)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThe constraint was hard: 8 GB VRAM. \u003c/p\u003e\u003ch2 id=\"attempt-1-cuda-go-brrr\"\u003eAttempt #1: CUDA Go Brrr\u003c/h2\u003e\u003cp\u003eI started with what felt like conservative hyperparams:\u003c/p\u003e\u003cpre\u003e\u003ccode class=\"language-python\"\u003emax_seq_length = 1024\nper_device_train_batch_size = 2\nlora_r = 16, lora_alpha = 32\u003c/code\u003e\u003c/pre\u003e\u003cp\u003eCUDA laughed at me. OOM within seconds.\u003c/p\u003e\u003cp\u003eFull fine-tuning a 3B model needs ~25 GB VRAM in fp16. Even with 4-bit QLoRA, the math isn't free - activations, optimizer states, and gradients all want their share. The 1024-token context length was the biggest memory hog; attention scales quadratically.\u003c/p\u003e\u003ch2 id=\"the-vram-tetris\"\u003eThe VRAM Tetris\u003c/h2\u003e\u003cp\u003eHere's what actually worked after three rounds of tuning:\u003c/p\u003e\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eParameter\u003c/th\u003e\n\u003cth\u003eInitial (OOM)\u003c/th\u003e\n\u003cth\u003eFinal (Stable)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003emax_seq_length\u003c/td\u003e\n\u003ctd\u003e1024\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e512\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eper_device_batch\u003c/td\u003e\n\u003ctd\u003e2\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e1\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003egradient_accumulation\u003c/td\u003e\n\u003ctd\u003e4\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e8\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eLoRA rank (r)\u003c/td\u003e\n\u003ctd\u003e16\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e8\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eLoRA alpha\u003c/td\u003e\n\u003ctd\u003e32\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e16\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePeak VRAM\u003c/td\u003e\n\u003ctd\u003e💥\u003c/td\u003e\n\u003ctd\u003e~5.8 GB\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eEffective batch size stayed at 8. The other tricks that helped:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003ccode\u003ePYTORCH_CUDA_ALLOC_CONF=expandable_segments:True\u003c/code\u003e - prevented fragmentation OOMs\u003c/li\u003e\u003cli\u003e\u003ccode\u003egradient_checkpointing=True\u003c/code\u003e - traded compute for memory\u003c/li\u003e\u003cli\u003e\u003ccode\u003eoptim=\"adamw_8bit\"\u003c/code\u003e — 8-bit optimizer states\u003c/li\u003e\u003cli\u003eDisabled \u003ccode\u003etorch.compile\u003c/code\u003e — saved 1-2 GB and avoided some Unsloth compatibility issues\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eHere's the final training config:\u003c/p\u003e\u003cpre\u003e\u003ccode class=\"language-python\"\u003efrom unsloth import FastLanguageModel\n\nmodel, tokenizer = FastLanguageModel.from_pretrained(\n    model_name=\"ibm-granite/granite-4.1-3b\",\n    max_seq_length=512\n)\n\nmodel = FastLanguageModel.get_peft_model(\n    model,\n    r=8, lora_alpha=16,\n    target_modules=[\"q_proj\", \"k_proj\", \"v_proj\", \"o_proj\",\n                    \"gate_proj\", \"up_proj\", \"down_proj\"],\n    lora_dropout=0.05,\n    use_gradient_checkpointing=\"unsloth\",\n)\u003c/code\u003e\u003c/pre\u003e\u003ch2 id=\"why-400-steps-why-not-500\"\u003eWhy 400 steps? Why not 500?\u003c/h2\u003e\u003cp\u003eFirst real training run: 400 steps, loss dropped from \u003cstrong\u003e1.28 → 0.53\u003c/strong\u003e. Nice curve, no divergence. I ran perplexity eval on a held-out Hindi set:\u003c/p\u003e\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eMetric\u003c/th\u003e\n\u003cth\u003eBase Granite 4.1\u003c/th\u003e\n\u003cth\u003eFine-Tuned\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003ePerplexity\u003c/td\u003e\n\u003ctd\u003e7.30\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e1.85\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTraining Loss\u003c/td\u003e\n\u003ctd\u003e1.28\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e0.53\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e74.7% reduction in perplexity. The model was actually generating coherent Hindi and answering factual questions, writing poetry, explaining Python loops. It retained its English and code abilities too, which is the whole point of LoRA.\u003c/p\u003e\u003cp\u003eI figured: \u003cem\u003elet's push it to 500 steps, see if we can squeeze out a bit more.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSo I tried to resume from the checkpoint. And hit this gem:\u003c/p\u003e\u003cblockquote\u003eRuntimeError: torch.load with weights_only=True requires torch 2.6+\u003c/blockquote\u003e\u003cp\u003eTransformers 5.5 introduced a security fix that broke checkpoint loading on my PyTorch 2.5 install. The checkpoint was perfectly valid -  I just couldn't load it without upgrading half my stack, which would have likely broken Unsloth's compiled kernels.\u003c/p\u003e\u003cp\u003eFine. Restart from scratch with \u003ccode\u003e--max_steps 500\u003c/code\u003e.\u003c/p\u003e\u003cp\u003eThe second run followed almost the exact same loss curve. By step 400, loss was at ~0.57. By step 500, it plateaued at \u003cstrong\u003e0.56\u003c/strong\u003e. The model had saturated - pushing further wouldn't have helped.\u003c/p\u003e\u003ch2 id=\"what-failed-and-why-its-fine\"\u003eWhat Failed (And Why It's Fine)\u003c/h2\u003e\u003ch3 id=\"gguf-export\"\u003eGGUF Export\u003c/h3\u003e\u003cp\u003eUnsloth's \u003ccode\u003emodel.save_pretrained_gguf()\u003c/code\u003e needs to compile llama.cpp from source. That needs \u003ccode\u003elibssl-dev\u003c/code\u003e, \u003ccode\u003elibcurl4-openssl-dev\u003c/code\u003e, and a bunch of other \u003ccode\u003e-dev\u003c/code\u003e packages. My environment didn't have sudo. I could've set up a Docker container or used a cloud VM, but honestly, the merged 16-bit safetensors model works perfectly with Transformers and loads in 4-bit with bitsandbytes. The GGUF would've been nice for Ollama/llama.cpp, but it wasn't blocking anything.\u003c/p\u003e\u003ch3 id=\"8b-model-not-happening\"\u003e8B Model: Not Happening\u003c/h3\u003e\u003cp\u003eI briefly considered trying the same recipe on Granite 8B. The math: even with 4-bit QLoRA at \u003ccode\u003eseq_len=512\u003c/code\u003e, it'd push ~10.5 GB VRAM. My 8 GB card said no. That's a cloud GPU job for another day.\u003c/p\u003e\u003ch3 id=\"torchcompile\"\u003etorch.compile\u003c/h3\u003e\u003cp\u003eUnsloth + torch.compile had some weird interactions on my CUDA 12.1 setup. Disabling it was simpler and only cost a few percentage points of throughput. On an 8 GB card doing QLoRA, you're bottlenecked by memory bandwidth anyway, not compilation overhead.\u003c/p\u003e\u003ch2 id=\"what-actually-worked\"\u003eWhat Actually Worked\u003c/h2\u003e\u003ch3 id=\"unsloth-%E2%9C%A8\"\u003eUnsloth ✨\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eUnsloth is genuinely magic.\u003c/strong\u003e It handled all the 4-bit loading, LoRA patching, and gradient checkpointing with a couple lines of code. The \u003ccode\u003eFastLanguageModel.get_peft_model()\u003c/code\u003e call auto-detects the architecture and sets up efficient kernels. Training throughput was ~0.6 samples/second, which got me through 500 steps in about 1.8 hours.\u003c/p\u003e\u003ch3 id=\"dataset-choice\"\u003eDataset choice\u003c/h3\u003e\u003cp\u003e\u003cstrong\u003eThe dataset matters more than hyperparams.\u003c/strong\u003e \u003ccode\u003eFreedomIntelligence/evol-instruct-hindi\u003c/code\u003e has 59K diverse instructions - factual QA, creative writing, code explanation, translation. The diversity meant the model learned Hindi \u003cem\u003egeneration\u003c/em\u003e rather than just Hindi \u003cem\u003ememorization\u003c/em\u003e. I tried a smaller dataset initially and got word-salad output.\u003c/p\u003e\u003ch2 id=\"wandb-%F0%9F%92%9B\"\u003eWandb 💛\u003c/h2\u003e\u003cp\u003e\u003cstrong\u003eW\u0026amp;B tracking saved my sanity.\u003c/strong\u003e I logged every 5 steps with \u003ccode\u003ereport_to=\"wandb\"\u003c/code\u003e. Being able to watch the loss curve in real-time (and notice it plateauing at step 400) meant I didn't waste hours training a saturated model.\u003c/p\u003e\u003ch2 id=\"the-model-in-practice\"\u003eThe Model in Practice\u003c/h2\u003e\u003cp\u003eAfter merging the LoRA adapter into the base model, I uploaded it to HuggingFace at \u003ca href=\"https://huggingface.co/xprilion/granite-4.1-3b-hindi-lora\"\u003ehttps://huggingface.co/xprilion/granite-4.1-3b-hindi-lora\u003c/a\u003e. Loading it is straightforward:\u003c/p\u003e\u003cpre\u003e\u003ccode class=\"language-python\"\u003efrom transformers import AutoModelForCausalLM, AutoTokenizer\n\nmodel = AutoModelForCausalLM.from_pretrained(\n    \"xprilion/granite-4.1-3b-hindi-lora\",\n    device_map=\"auto\"\n)\ntokenizer = AutoTokenizer.from_pretrained(\"xprilion/granite-4.1-3b-hindi-lora\")\n\nprompt = \"मुझे पायथन में फॉर लूप समझाओ\"\ninputs = tokenizer(prompt, return_tensors=\"pt\").to(\"cuda\")\noutputs = model.generate(**inputs, max_new_tokens=1000, temperature=0.7)\nprint(tokenizer.decode(outputs[0], skip_special_tokens=True))\u003c/code\u003e\u003c/pre\u003e\u003cp\u003eQualitatively, it handles:\u003c/p\u003e\u003cul\u003e\u003cli\u003eFactual QA: \"भारत की राजधानी क्या है?\" → correct, natural Hindi\u003c/li\u003e\u003cli\u003eCode explanation: Explains Python concepts in Hindi with code examples\u003c/li\u003e\u003cli\u003eCreative writing: Generates poetry, stories in Hindi\u003c/li\u003e\u003cli\u003eEnglish retention: Still answers English prompts correctly\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eIt's not perfect. Complex multi-turn reasoning can drift, and very domain-specific Hindi (legal, medical) sometimes produces mixed-language output. But for a 3B model trained in under 2 hours on a laptop GPU? I'll take it.\u003c/p\u003e\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\u003cp\u003eTurns out your humble 8GB laptop GPU isn’t useless - it just has a very strong personality and demands compromises. With the right tricks, you can absolutely teach an \u003cs\u003eold monkey a few new tricks\u003c/s\u003e 3B model new languages… just don’t expect it to handle too many tokens.. In the end, it’s less “brute force AI” and more “carefully negotiated truce with VRAM.”\u003c/p\u003e\u003chr\u003e\u003cp\u003eThe model is up on HuggingFace if you want to try it: \u003ca href=\"https://huggingface.co/xprilion/granite-4.1-3b-hindi-lora\"\u003ehttps://huggingface.co/xprilion/granite-4.1-3b-hindi-lora\u003c/a\u003e.\u003c/p\u003e\u003cp\u003eColab notebook - \u003ca href=\"https://xpri.dev/6cti\"\u003ehttps://xpri.dev/6cti\u003c/a\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"6:[\"$\",\"$L14\",null,{\"children\":[[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"$L15\",null,{\"href\":\"/posts\",\"className\":\"text-blue-600 hover:underline mb-4 block\",\"children\":\"← Back to all posts\"}],[\"$\",\"h1\",null,{\"className\":\"text-2xl md:text-3xl font-bold mb-2\",\"children\":\"74% better Hindi for IBM Granite 4.1 on a Laptop GPU\"}],[\"$\",\"p\",null,{\"className\":\"text-gray-600 dark:text-gray-200 text-sm \",\"children\":\"1 May, 2026\"}]]}],[\"$\",\"$L16\",null,{\"src\":\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2026/05/-Cover--Post---GKE-TPU-VLLM-Autoscaling--2-.png\",\"alt\":\"74% better Hindi for IBM Granite 4.1 on a Laptop GPU\",\"loading\":\"lazy\",\"className\":\"w-full h-auto mb-6 rounded-lg object-cover object-center shadow-md shadow-gray-400/30 dark:shadow-gray-700/30\",\"width\":1000,\"height\":1000}],[\"$\",\"$L17\",null,{\"html\":\"$18\",\"slug\":\"teching-ibm-granite-hindi-on-a-laptop-gpu\",\"title\":\"74% better Hindi for IBM Granite 4.1 on a Laptop GPU\"}],[\"$\",\"$L19\",null,{\"id\":\"MathJax-script\",\"src\":\"https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js\",\"async\":true,\"strategy\":\"afterInteractive\"}],[\"$\",\"$L19\",null,{\"id\":\"MathJax-config\",\"strategy\":\"beforeInteractive\",\"dangerouslySetInnerHTML\":{\"__html\":\"\\n          MathJax = {\\n            tex: {\\n              inlineMath: [['((', '))']],\\n              displayMath: [['[[', ']]']],\\n            },\\n            svg: {\\n              fontCache: 'global'\\n            }\\n          };\\n        \"}}]]}]\n"])</script><script>self.__next_f.push([1,"13:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"74% better Hindi for IBM Granite 4.1 on a Laptop GPU\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"The model beats Opus 4.6 on table extraction, a sweet use-case for an SLM, and supports 10+ languages, alas, no Hindi. I decided to change that.\"}],[\"$\",\"meta\",\"2\",{\"property\":\"og:title\",\"content\":\"74% better Hindi for IBM Granite 4.1 on a Laptop GPU | xprilion's blog\"}],[\"$\",\"meta\",\"3\",{\"property\":\"og:description\",\"content\":\"The model beats Opus 4.6 on table extraction, a sweet use-case for an SLM, and supports 10+ languages, alas, no Hindi. I decided to change that.\"}],[\"$\",\"meta\",\"4\",{\"property\":\"og:image\",\"content\":\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2026/05/-Cover--Post---GKE-TPU-VLLM-Autoscaling--2-.png\"}],[\"$\",\"meta\",\"5\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"6\",{\"name\":\"twitter:title\",\"content\":\"74% better Hindi for IBM Granite 4.1 on a Laptop GPU | xprilion's blog\"}],[\"$\",\"meta\",\"7\",{\"name\":\"twitter:description\",\"content\":\"The model beats Opus 4.6 on table extraction, a sweet use-case for an SLM, and supports 10+ languages, alas, no Hindi. I decided to change that.\"}],[\"$\",\"meta\",\"8\",{\"name\":\"twitter:image\",\"content\":\"https://digitalpress.fra1.cdn.digitaloceanspaces.com/4ml9m8u/2026/05/-Cover--Post---GKE-TPU-VLLM-Autoscaling--2-.png\"}],[\"$\",\"link\",\"9\",{\"rel\":\"icon\",\"href\":\"/logo.jpg\"}]],\"error\":null,\"digest\":\"$undefined\"}\nd:{\"metadata\":\"$13:metadata\",\"error\":null,\"digest\":\"$undefined\"}\n"])</script></body></html>
